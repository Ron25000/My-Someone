<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ila ruhi <33333</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Playfair+Display:ital@0;1&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* DIMMED SUNSET BACKGROUND */
    background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), 
                url('https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?q=80&w=2000&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    overflow: hidden;
    perspective: 2500px;
}

/* Clouds Animation */
.clouds {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/clouds.png');
    opacity: 0.15;
    animation: moveClouds 140s linear infinite;
    pointer-events: none;
}

@keyframes moveClouds {
    from { background-position: 0 0; }
    to { background-position: 10000px 0; }
}

/* Book Container */
.book {
    position: relative;
    width: 400px;
    height: 540px;
    transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
    transform-style: preserve-3d;
    cursor: pointer;
    z-index: 10;
}

.book.open {
    transform: translateX(180px); 
}

/* Cover Styling */
.cover {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    border-radius: 5px 15px 15px 5px;
    transform-origin: left;
    transition: transform 1.6s ease-in-out;
    z-index: 10;
    background: #3d0202; /* Deep Wine Leather */
    border: 7px solid #b8860b; /* Gold border */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #b8860b;
    backface-visibility: hidden;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.8), 20px 20px 50px rgba(0,0,0,0.6);
}

.cover h1 {
    font-family: 'Cinzel', serif;
    font-size: 38px;
    letter-spacing: 4px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
}

.cover p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    margin-top: 15px;
    opacity: 0.6;
}

.book.open .cover {
    transform: rotateY(-170deg);
}

/* Page Styling */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fdf5e6;
    background-image: url('https://www.transparenttextures.com/patterns/papyros.png');
    padding: 50px 35px;
    border-radius: 2px 12px 12px 2px;
    box-shadow: inset 15px 0 30px rgba(0,0,0,0.2);
    z-index: 1;
    overflow-y: auto;
}

#letter-text {
    font-family: 'Great Vibes', cursive;
    font-size: 26px;
    line-height: 1.7;
    color: #2c1e0a;
    white-space: pre-line;
}

.hint {
    position: absolute;
    bottom: -50px;
    width: 100%;
    text-align: center;
    color: rgba(255, 255, 255, 0.7);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    animation: fadePulse 2.5s infinite;
}

@keyframes fadePulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
}

/* Hidden YouTube Player */
#player-container { 
    position: absolute; 
    bottom: 0; right: 0;
    width: 200px; height: 200px; 
    opacity: 0.01; 
    pointer-events: none; 
    z-index: -1;
}
</style>
</head>

<body>

<div id="player-container"><div id="youtube-player"></div></div>
<div class="clouds"></div>

<div class="book" id="myBook" onclick="openExperience()">
    <div class="cover">
        <h1>Ila ruhi</h1>
        <p>To my soul</p>
        <div style="margin-top: 40px; font-size: 30px; opacity: 0.4;">🖋️</div>
    </div>

    <div class="page" id="letterPage">
        <div id="letter-text"></div>
    </div>
    
    <div class="hint" id="hint">Click to Open the Journal</div>
</div>

<script>
// YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        height: '200', 
        width: '200',
        videoId: 'O3lTm9EWBWo', // Fading into you - Reed Wonder ft. Aurora Olivas
        playerVars: { 
            'autoplay': 0, 
            'controls': 0, 
            'mute': 0, 
            'loop': 1,
            'playlist': 'O3lTm9EWBWo',
            'origin': window.location.origin 
        }
    });
}

const text = `I wish there was a way to tell you how much I miss you, I don't think there is a word in the world to describe that feeling. 

But I miss you the moment we're not next to each other. Time actually feels slow when we're together, and even then that much time doesn't feel enough. 

Being next to you feels like having an angel by my side, you have this calming presence and everything feels so peaceful when I lay on your shoulder or next to you... yet you give me this chaos of so many feelings all at once and somehow there is Clarity even in that chaos. 

I believe love is not fully an emotion one feels when the moment is perfect. I believe in choosing love even when there is chaos and that does not even fully describe what you have shown me. 

I just wanted to do this because you deserve it and you are soooooo amazing. 

I love you. <3333333`;

let index = 0;
let started = false;

function openExperience() {
    if (started) return;
    started = true;

    document.getElementById("myBook").classList.add("open");
    document.getElementById("hint").style.display = "none";

    // Play "Fading into you"
    if (player && typeof player.playVideo === 'function') {
        player.playVideo();
        player.setVolume(70);
    }

    // Start writing after book opens
    setTimeout(typeWriter, 1500);
}

function typeWriter() {
    if (index < text.length) {
        const letterDiv = document.getElementById("letter-text");
        const page = document.getElementById("letterPage");
        
        letterDiv.innerHTML += text.charAt(index);
        index++;
        page.scrollTop = page.scrollHeight;
        setTimeout(typeWriter, 55);
    }
}
</script>

</body>
</html>
